name: Tap CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Validate tap contents
        shell: bash
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          formulae=(Formula/*.rb)
          casks=(Casks/*.rb)

          if [ ${#formulae[@]} -eq 0 ] && [ ${#casks[@]} -eq 0 ]; then
            echo "No formulae or casks found. Skipping checks."
            exit 0
          fi

          brew update --quiet
          brew --version

          if [ ${#formulae[@]} -gt 0 ]; then
            echo "Running brew style for formulae..."
            brew style "${formulae[@]}"

            echo "Running brew audit for formulae..."
            brew audit --strict --online "${formulae[@]}"

            echo "Building formulae from source..."
            for formula in "${formulae[@]}"; do
              name="$(basename "$formula" .rb)"
              echo "Installing $name from $formula"
              brew install --build-from-source "$formula"
              brew uninstall --force "$name"
            done
          else
            echo "No formulae found in Formula/. Skipping formula checks."
          fi

          if [ ${#casks[@]} -gt 0 ]; then
            echo "Running brew style for casks..."
            brew style "${casks[@]}"

            echo "Running brew audit for casks..."
            brew audit --cask --strict --online "${casks[@]}"
          else
            echo "No casks found in Casks/. Skipping cask checks."
          fi
