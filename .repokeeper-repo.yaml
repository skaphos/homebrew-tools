apiVersion: repokeeper/v1
kind: RepoMetadata
repo_id: github.com/skaphos/homebrew-tools
name: Homebrew Tools
labels:
    kind: distribution
    org: skaphos
    role: homebrew-tap
entrypoints:
    readme: README.md
paths:
    authoritative:
        - Formula/
        - Casks/
    low_value:
        - .github/
related_repos:
    - repo_id: github.com/skaphos/repokeeper
      relationship: distributes
